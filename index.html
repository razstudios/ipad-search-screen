<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<title>Search Bar Only</title>
<style>
  :root{
    --bg:#f7f8fa;
    --bar:#ffffff;
    --border:#d9dce2;
    --text:#1f2328;
    --muted:#777c84;
  }

  html, body{
    margin:0;
    width:100%;
    height:100%;
    overflow:hidden;
    background:var(--bg);
    font-family:-apple-system,BlinkMacSystemFont,"SF Pro Text","Helvetica Neue",Arial,sans-serif;
    -webkit-user-select:none;
    user-select:none;
  }

  body{
    position:fixed;
    inset:0;
  }

  .stage{
    width:100vw;
    height:100vh;
    position:relative;
    background:
      radial-gradient(circle at 80% 10%, rgba(255,255,255,.98), transparent 30%),
      linear-gradient(180deg,#ffffff 0%,#f7f8fa 52%,#eef0f3 100%);
  }

  .search-wrap{
    position:absolute;
    left:6vw;
    right:6vw;
    top:9vh;
    height:10vh;
    display:flex;
    align-items:center;
    background:var(--bar);
    border:1.5px solid var(--border);
    border-radius:20px;
    box-shadow:0 1px 2px rgba(0,0,0,.05);
  }

  .search-icon{
    width:3.5vh;
    height:3.5vh;
    margin-left:2.2vw;
    color:var(--muted);
    flex:0 0 auto;
  }

  #searchInput{
    flex:1;
    height:100%;
    border:0;
    outline:0;
    background:transparent;
    color:var(--text);
    font-size:clamp(30px,4.8vh,58px);
    letter-spacing:-.035em;
    font-weight:400;
    padding:0 1.8vw;
    font-family:inherit;
    -webkit-user-select:text;
    user-select:text;
  }

  #searchInput::placeholder{
    color:#9ba0a8;
  }

  .mic{
    width:3.9vh;
    height:3.9vh;
    margin-right:2.2vw;
    color:var(--muted);
    flex:0 0 auto;
  }

  .tap-note{
    position:absolute;
    left:0;
    right:0;
    bottom:8vh;
    text-align:center;
    color:rgba(0,0,0,.18);
    font-size:2.4vh;
    pointer-events:none;
  }

  @media (orientation:portrait){
    .search-wrap{
      top:8vh;
      height:7.5vh;
    }

    #searchInput{
      font-size:clamp(26px,3.5vh,44px);
    }
  }
</style>
</head>
<body>
<main class="stage">
  <div class="search-wrap" id="searchWrap">
    <svg class="search-icon" viewBox="0 0 24 24" aria-hidden="true">
      <circle cx="10.6" cy="10.6" r="6.6" fill="none" stroke="currentColor" stroke-width="2.35"/>
      <path d="M15.5 15.5L21 21" fill="none" stroke="currentColor" stroke-width="2.35" stroke-linecap="round"/>
    </svg>

    <input
      id="searchInput"
      type="text"
      placeholder="Search"
      autocomplete="off"
      autocorrect="off"
      autocapitalize="sentences"
      spellcheck="false"
      aria-label="Search"
    />

    <svg class="mic" viewBox="0 0 24 24" aria-hidden="true">
      <rect x="9" y="3" width="6" height="11" rx="3" fill="currentColor"/>
      <path d="M5.5 11.2a6.5 6.5 0 0013 0" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
      <path d="M12 18v3M8.5 21h7" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
    </svg>
  </div>

  <div class="tap-note">Tap search bar to type. Triple-tap search bar to clear.</div>
</main>

<script>
(function(){
  const input = document.getElementById("searchInput");
  const searchWrap = document.getElementById("searchWrap");

  function focusInput(){
    setTimeout(() => {
      input.focus({preventScroll:true});
      const len = input.value.length;
      input.setSelectionRange(len, len);
    }, 80);
  }

  searchWrap.addEventListener("click", focusInput);

  // Triple-tap to clear between takes.
  let taps = 0;
  searchWrap.addEventListener("touchend", () => {
    taps++;
    setTimeout(() => taps = 0, 450);

    if(taps >= 3){
      input.value = "";
      taps = 0;
      focusInput();
    }
  });

  // Optional: prefill from URL, e.g.
  // ?q=How%20Old%20is%20Godzilla%3F
  const params = new URLSearchParams(window.location.search);
  const q = params.get("q");
  if(q){
    input.value = q;
  }

  setTimeout(focusInput, 400);
})();
</script>
</body>
</html>
